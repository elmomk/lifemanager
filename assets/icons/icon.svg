<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="none" stroke="#00f0ff" stroke-width="3" stroke-opacity="0.4"/>

  <!-- Cat face - cyberpunk style -->
  <!-- Ears -->
  <polygon points="150,180 190,90 230,180" fill="none" stroke="#00f0ff" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="282,180 322,90 362,180" fill="none" stroke="#00f0ff" stroke-width="6" stroke-linejoin="round"/>
  <!-- Inner ears -->
  <polygon points="165,175 190,110 215,175" fill="#00f0ff" opacity="0.15"/>
  <polygon points="297,175 322,110 347,175" fill="#00f0ff" opacity="0.15"/>

  <!-- Head outline -->
  <ellipse cx="256" cy="260" rx="130" ry="120" fill="none" stroke="#00f0ff" stroke-width="5"/>

  <!-- Eyes - glowing -->
  <ellipse cx="210" cy="240" rx="28" ry="30" fill="#00f0ff" opacity="0.15" stroke="#00f0ff" stroke-width="3"/>
  <ellipse cx="302" cy="240" rx="28" ry="30" fill="#00f0ff" opacity="0.15" stroke="#00f0ff" stroke-width="3"/>
  <!-- Pupils - vertical slits -->
  <ellipse cx="210" cy="240" rx="6" ry="22" fill="#00ff41"/>
  <ellipse cx="302" cy="240" rx="6" ry="22" fill="#00ff41"/>

  <!-- Nose -->
  <polygon points="256,280 248,292 264,292" fill="#ff2d78"/>

  <!-- Mouth -->
  <path d="M248,292 Q236,310 224,300" fill="none" stroke="#00f0ff" stroke-width="3" stroke-linecap="round"/>
  <path d="M264,292 Q276,310 288,300" fill="none" stroke="#00f0ff" stroke-width="3" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="120" y1="270" x2="185" y2="280" stroke="#00f0ff" stroke-width="2.5" opacity="0.6"/>
  <line x1="125" y1="295" x2="185" y2="290" stroke="#00f0ff" stroke-width="2.5" opacity="0.6"/>
  <line x1="327" y1="280" x2="392" y2="270" stroke="#00f0ff" stroke-width="2.5" opacity="0.6"/>
  <line x1="327" y1="290" x2="387" y2="295" stroke="#00f0ff" stroke-width="2.5" opacity="0.6"/>

  <!-- Five module dots -->
  <circle cx="140" cy="420" r="12" fill="#00f0ff" opacity="0.8"/>
  <circle cx="195" cy="420" r="12" fill="#00ff41" opacity="0.8"/>
  <circle cx="250" cy="420" r="12" fill="#ff8c00" opacity="0.8"/>
  <circle cx="305" cy="420" r="12" fill="#bf5af2" opacity="0.8"/>
  <circle cx="360" cy="420" r="12" fill="#ff2d78" opacity="0.8"/>
</svg>
